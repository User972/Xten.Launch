# Per-tenant front nginx. The shared nginx-proxy terminates TLS and forwards here over HTTP;
# this server forwards to the tenant's nopCommerce app. X-Forwarded-Proto from the outer proxy
# is passed through so nopCommerce (HostingConfig.UseProxy=true) sees the real https scheme.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;          # product/cover image uploads in admin

    location / {
        proxy_pass http://nopcommerce:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;   # from the outer proxy
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
    }
}
